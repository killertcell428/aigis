<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#131f57"/>
      <stop offset="100%" stop-color="#1340e1"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Shield icon -->
  <g transform="translate(88, 200)">
    <path d="M64 0L0 28v40c0 37.6 25.4 72.7 64 83.3C102.6 140.7 128 105.6 128 69.3V28L64 0z"
      fill="white" fill-opacity="0.12" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <path d="M44 70l18 18 30-30" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text x="240" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">AI Guardian</text>

  <!-- Tagline -->
  <text x="88" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#93b4fd">Stop AI threats before they reach your LLM</text>

  <!-- Sub description -->
  <text x="88" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#5994ff">OpenAI-compatible security proxy · Human-in-the-Loop review · 20+ threat patterns</text>

  <!-- Badges -->
  <rect x="88" y="460" width="140" height="40" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="158" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" text-anchor="middle">SOC2 Ready</text>

  <rect x="248" y="460" width="100" height="40" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="298" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" text-anchor="middle">GDPR</text>

  <rect x="368" y="460" width="160" height="40" rx="20" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <text x="448" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" text-anchor="middle">99.9% Uptime</text>

  <!-- Right side decorative flow -->
  <g transform="translate(720, 180)" opacity="0.9">
    <!-- App box -->
    <rect width="140" height="80" rx="12" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="70" y="38" font-family="system-ui" font-size="16" fill="white" text-anchor="middle" font-weight="600">Your App</text>
    <text x="70" y="58" font-family="system-ui" font-size="12" fill="#93b4fd" text-anchor="middle">Python / Node.js</text>

    <!-- Arrow 1 -->
    <line x1="148" y1="40" x2="190" y2="40" stroke="#5994ff" stroke-width="2"/>
    <polygon points="190,35 200,40 190,45" fill="#5994ff"/>

    <!-- Guardian box (highlight) -->
    <rect x="208" y="-10" width="160" height="100" rx="12" fill="#1a4ff5" stroke="#5994ff" stroke-width="2"/>
    <text x="288" y="38" font-family="system-ui" font-size="16" fill="white" text-anchor="middle" font-weight="700">AI Guardian</text>
    <text x="288" y="58" font-family="system-ui" font-size="12" fill="#bcd6ff" text-anchor="middle">Security Proxy</text>

    <!-- Arrow 2 -->
    <line x1="376" y1="40" x2="418" y2="40" stroke="#5994ff" stroke-width="2"/>
    <polygon points="418,35 428,40 418,45" fill="#5994ff"/>

    <!-- LLM box -->
    <rect x="436" y="0" width="140" height="80" rx="12" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="506" y="38" font-family="system-ui" font-size="16" fill="white" text-anchor="middle" font-weight="600">LLM</text>
    <text x="506" y="58" font-family="system-ui" font-size="12" fill="#93b4fd" text-anchor="middle">OpenAI / Any</text>

    <!-- Status pills below -->
    <rect x="208" y="120" width="70" height="28" rx="14" fill="#166534"/>
    <text x="243" y="138" font-family="system-ui" font-size="13" fill="#86efac" text-anchor="middle">✓ Allow</text>

    <rect x="290" y="120" width="76" height="28" rx="14" fill="#854d0e"/>
    <text x="328" y="138" font-family="system-ui" font-size="13" fill="#fde68a" text-anchor="middle">⏳ Review</text>

    <rect x="378" y="120" width="70" height="28" rx="14" fill="#7f1d1d"/>
    <text x="413" y="138" font-family="system-ui" font-size="13" fill="#fca5a5" text-anchor="middle">✕ Block</text>
  </g>
</svg>
