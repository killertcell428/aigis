name: Trigger Zenn Deploy

on:
  schedule:
    - cron: '0 23 6 4 *'

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Zenn deploy with empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger Zenn deploy for guideline-v12 article"
          git push
