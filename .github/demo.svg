<svg xmlns="http://www.w3.org/2000/svg" width="720" height="440" viewBox="0 0 720 440">
  <style>
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }
    .cmd { fill: #8b949e; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
    .prompt { fill: #7ee787; }
    .output { fill: #e6edf3; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
    .red { fill: #f85149; }
    .green { fill: #3fb950; }
    .yellow { fill: #d29922; }
    .accent { fill: #58a6ff; }
    .muted { fill: #8b949e; }
    .title { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; font-weight: 600; }
  </style>

  <!-- Window -->
  <rect class="bg" width="720" height="440" rx="8"/>
  <rect class="bar" width="720" height="32" rx="8"/>
  <rect class="bg" x="0" y="24" width="720" height="8"/>
  <circle class="dot-r" cx="20" cy="16" r="6"/>
  <circle class="dot-y" cx="40" cy="16" r="6"/>
  <circle class="dot-g" cx="60" cy="16" r="6"/>
  <text class="title" x="360" y="20" text-anchor="middle">Aigis — Terminal Demo</text>

  <!-- Line 1: install -->
  <text class="prompt" x="20" y="60">$</text>
  <text class="cmd" x="35" y="60">pip install pyaigis</text>
  <text class="muted" x="35" y="78">Successfully installed pyaigis-0.0.1</text>

  <!-- Line 2: scan injection -->
  <text class="prompt" x="20" y="110">$</text>
  <text class="cmd" x="35" y="110">aigis scan "Ignore all previous instructions"</text>
  <text class="red" x="35" y="132">CRITICAL (score=95)</text>
  <text class="output" x="35" y="150">Matched: Ignore Previous Instructions (OWASP LLM01)</text>
  <text class="output" x="35" y="168">Matched: System Prompt Extraction (OWASP LLM07)</text>
  <text class="red" x="35" y="186">→ BLOCKED</text>

  <!-- Line 3: safe input -->
  <text class="prompt" x="20" y="218">$</text>
  <text class="cmd" x="35" y="218">aigis scan "What is the capital of France?"</text>
  <text class="green" x="35" y="240">LOW (score=0)</text>
  <text class="green" x="35" y="258">→ SAFE</text>

  <!-- Line 4: SQL injection -->
  <text class="prompt" x="20" y="290">$</text>
  <text class="cmd" x="35" y="290">aigis scan "SELECT * FROM users; DROP TABLE"</text>
  <text class="red" x="35" y="312">CRITICAL (score=85)</text>
  <text class="output" x="35" y="330">Matched: SQL Injection - DROP TABLE (OWASP LLM02)</text>
  <text class="red" x="35" y="348">→ BLOCKED</text>

  <!-- Line 5: Python -->
  <text class="prompt" x="20" y="380">$</text>
  <text class="cmd" x="35" y="380">python -c "from aigis import Guard; print(Guard().check_input('DAN').blocked)"</text>
  <text class="green" x="35" y="402">True</text>

  <!-- Footer -->
  <text class="accent" x="360" y="430" text-anchor="middle">github.com/killertcell428/aigis</text>
</svg>
